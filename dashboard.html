<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金交易信号监控</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b0e14;
            color: #e0e4eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: #141a24;
            border-radius: 28px;
            padding: 30px 28px 36px;
            border: 1px solid #2a3340;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }
        .header h1 {
            font-size: 22px;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            background: #1f2a36;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid #2e3b4a;
            color: #9aaec9;
        }
        .price-card {
            background: #1e2633;
            border-radius: 18px;
            padding: 22px 20px;
            margin-bottom: 20px;
            border-left: 6px solid #f6b26b;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .price-left .label { font-size: 14px; color: #8899b0; }
        .price-left .value { font-size: 40px; font-weight: 700; color: #fff; }
        .price-left .value small { font-size: 17px; color: #8899b0; margin-left: 4px; }
        .price-right { text-align: right; }
        .price-right .change { font-size: 18px; font-weight: 500; }
        .price-right .change.up { color: #7ddfb3; }
        .price-right .change.down { color: #f28b82; }
        .price-right .sub { font-size: 13px; color: #8899b0; margin-top: 3px; }
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #1a212c;
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
            border: 1px solid #26303e;
        }
        .stat-box .num { font-size: 19px; font-weight: 600; color: #fff; }
        .stat-box .lbl { font-size: 12px; color: #7a8aa0; margin-top: 4px; }
        .stat-box .lbl i { font-style: normal; color: #f6b26b; }
        .signal-card {
            background: #1a212c;
            border-radius: 18px;
            padding: 20px 20px 16px;
            margin-bottom: 16px;
            border: 1px solid #2a3442;
        }
        .signal-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .signal-label { font-size: 15px; color: #a0b2c9; }
        .signal-value { font-size: 26px; font-weight: 700; }
        .signal-value.buy { color: #7ddfb3; }
        .signal-value.sell { color: #f28b82; }
        .signal-value.hold { color: #f6c96e; }
        .signal-reason {
            margin-top: 8px;
            font-size: 15px;
            background: #0f151e;
            padding: 10px 14px;
            border-radius: 12px;
            border-left: 4px solid #f6c96e;
            color: #bcc9dd;
        }
        .condition-box {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            background: #0f151e;
            border-radius: 14px;
            padding: 16px 18px;
            margin: 14px 0 16px;
            border: 1px dashed #2f3b4c;
        }
        .condition-item .tag { font-size: 12px; color: #7a8aa0; }
        .condition-item .val { font-size: 17px; font-weight: 600; }
        .condition-item .val.green { color: #7ddfb3; }
        .condition-item .val.red { color: #f28b82; }
        .footer-meta {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            font-size: 13px;
            color: #6f7f96;
            padding-top: 14px;
            border-top: 1px solid #1f2937;
            margin-top: 6px;
        }
        .footer-meta .warn { color: #f6c96e; }
        .btn-refresh {
            background: #2a3442;
            border: none;
            color: #cbd8ec;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #3b485a;
        }
        .btn-refresh:hover { background: #3b485a; color: #fff; }
        .risk { font-size: 12px; color: #4a5a6e; text-align: center; border-top: 1px solid #1b2430; padding-top: 14px; margin-top: 14px; }
        @media (max-width: 550px) {
            .grid-4 { grid-template-columns: 1fr 1fr; }
            .price-left .value { font-size: 30px; }
            .container { padding: 18px 14px; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>⛁ 黄金 EA 监控</h1>
        <div class="badge">🤖 AI 置信度 70%</div>
    </div>

    <div class="price-card">
        <div class="price-left">
            <div class="label">XAUUSD 实时价格</div>
            <div class="value">4117.07 <small>USD</small></div>
        </div>
        <div class="price-right">
            <div class="change down">▼ -2.67 (-0.06%)</div>
            <div class="sub">参考价 4119.74</div>
        </div>
    </div>

    <div class="grid-4">
        <div class="stat-box"><div class="num">4119.74</div><div class="lbl">📈 20日均线</div></div>
        <div class="stat-box"><div class="num">46.5</div><div class="lbl">📊 RSI <i>(中性)</i></div></div>
        <div class="stat-box"><div class="num">37.34</div><div class="lbl">📉 布林带宽</div></div>
        <div class="stat-box"><div class="num">11.87</div><div class="lbl">⚡ ATR 波动率</div></div>
    </div>

    <div class="signal-card">
        <div class="signal-row">
            <span class="signal-label">📌 交易建议</span>
            <span class="signal-value buy">📈 买入（做多）</span>
        </div>
        <div class="signal-reason">⚠️ AI 看涨，上涨概率 70.6% &nbsp;·&nbsp; 上涨概率 70%</div>
    </div>

    <div class="condition-box">
        <div class="condition-item">
            <div class="tag">📈 建议买入</div>
            <div class="val green">突破 4123.01 做多</div>
        </div>
        <div class="condition-item">
            <div class="tag">📉 建议卖出</div>
            <div class="val red">跌破 4111.13 做空</div>
        </div>
    </div>

    <div class="footer-meta">
        <div><span class="warn">⏱ 建议每 30-60 分钟刷新</span></div>
        <div class="time">🕒 数据时间：2026-07-10 12:30:27</div>
        <button class="btn-refresh" onclick="location.reload()">⟳ 刷新数据</button>
    </div>

    <div class="risk">⚡ 建议仅供参考 · 请自行判断风险</div>

</div>

</body>
</html>
